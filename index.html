<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fact over Opinion — 공시 × 주가 패턴 분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d;
  --surface: #0d1117;
  --card: #111620;
  --border: #1c2535;
  --border2: #263040;
  --accent: #00e5a0;
  --red: #ff4d6d;
  --gold: #f5a623;
  --blue: #4d9fff;
  --purple: #a78bfa;
  --text: #e8edf5;
  --text2: #8899aa;
  --text3: #3d4f63;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --display: 'Bebas Neue', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1680px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* ══════════════════════════════
   헤더 — 슬림하게 한 줄
══════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  gap: 24px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.logo-badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
  background: rgba(0,229,160,0.08);
  border: 1px solid rgba(0,229,160,0.25);
  padding: 4px 10px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.site-title {
  font-family: var(--display);
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--text);
  white-space: nowrap;
}

.site-title em {
  color: var(--accent);
  font-style: normal;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hstat {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 16px;
  white-space: nowrap;
}

.hstat-val {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--accent);
  line-height: 1;
}

.hstat-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-sub {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
  font-family: var(--mono);
  white-space: nowrap;
}

/* ══════════════════════════════
   종목 선택
══════════════════════════════ */
.stock-section {
  margin-bottom: 20px;
}

.section-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stock-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.stock-btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.stock-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.stock-btn.active {
  background: rgba(0,229,160,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

/* ══════════════════════════════
   메인 레이아웃
══════════════════════════════ */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 16px;
  align-items: start;
}

.left-col { min-width: 0; }

.right-col {
  position: sticky;
  top: 20px;
}

/* ══════════════════════════════
   차트 패널
══════════════════════════════ */
.chart-panel {
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.chart-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
}

.chart-stock-name {
  font-family: var(--display);
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1;
}

.price-block {
  text-align: right;
}

.price-value {
  font-family: var(--display);
  font-size: 36px;
  letter-spacing: 2px;
  color: var(--accent);
  line-height: 1;
}

.price-change {
  font-family: var(--mono);
  font-size: 13px;
  margin-top: 4px;
  font-weight: 500;
}

.price-change.up { color: var(--accent); }
.price-change.down { color: var(--red); }

/* ══════════════════════════════
   패턴 컨트롤 바
══════════════════════════════ */
.pattern-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toggle-switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 22px;
  cursor: pointer;
  flex-shrink: 0;
}

.toggle-switch input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border2);
  border-radius: 22px;
  transition: 0.2s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: var(--text3);
  border-radius: 50%;
  transition: 0.2s;
}

.toggle-switch input:checked + .toggle-slider { background: rgba(0,229,160,0.3); }
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
  background: var(--accent);
}

.toggle-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
}

.toggle-label.active { color: var(--accent); }

.pattern-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

/* ══════════════════════════════
   공시 유형 선택
══════════════════════════════ */
.type-select-wrap {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.type-select-wrap.visible { display: flex; }

.type-label-small {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.type-btn {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  background: transparent;
  border: 1px solid var(--border);
  padding: 5px 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}

.type-btn:hover { border-color: var(--gold); color: var(--gold); }
.type-btn.active {
  background: rgba(245,166,35,0.1);
  border-color: rgba(245,166,35,0.5);
  color: var(--gold);
}

/* ══════════════════════════════
   통계 바 (패턴 분석 요약)
══════════════════════════════ */
.stats-bar {
  display: none;
  padding: 14px 28px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.1);
  flex-wrap: wrap;
}

.stats-bar.visible { display: flex; }

.stat-pill {
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 16px;
  flex: 1;
  min-width: 90px;
}

.stat-pill-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stat-pill-val {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: 1px;
  line-height: 1;
}

.stat-pill-val.up { color: var(--accent); }
.stat-pill-val.down { color: var(--red); }
.stat-pill-val.neutral { color: var(--gold); }

/* ══════════════════════════════
   차트 영역
══════════════════════════════ */
.chart-body { padding: 20px 24px 8px; }

canvas { max-height: 440px; }

.chart-legend {
  display: flex;
  gap: 20px;
  padding: 12px 28px 16px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.legend-line { width: 20px; height: 2px; }
.legend-diamond { width: 8px; height: 8px; transform: rotate(45deg); }

/* ══════════════════════════════
   공시 이력 테이블
══════════════════════════════ */
.table-panel {
  background: var(--card);
  border: 1px solid var(--border);
}

.table-panel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.table-title {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--text);
}

.filter-wrap {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  background: transparent;
  border: 1px solid var(--border);
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: rgba(0,229,160,0.1);
  border-color: rgba(0,229,160,0.4);
  color: var(--accent);
}

.table-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  white-space: nowrap;
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 28px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  font-weight: 400;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr:last-child { border-bottom: none; }

tbody td {
  padding: 12px 28px;
  vertical-align: middle;
  color: var(--text2);
}

.td-date {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}

.td-type {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  border-radius: 2px;
  display: inline-block;
}

.td-change {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  text-align: right;
}

.td-change.up { color: var(--accent); }
.td-change.down { color: var(--red); }
.td-change.neutral { color: var(--text3); }

.dart-link {
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.dart-link:hover { color: var(--accent); }

.dart-icon {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  opacity: 0.5;
}

.dart-link:hover .dart-icon { opacity: 1; }

/* ══════════════════════════════
   통계 분석 패널 (우측)
══════════════════════════════ */
.stats-panel {
  background: var(--card);
  border: 1px solid var(--border);
}

.stats-panel-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

.stats-panel-title {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--text);
}

.stats-panel-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  margin-top: 3px;
}

.stats-panel-body { padding: 18px 20px; }

/* 요약 카드 그리드 */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 22px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
}

.summary-val {
  font-family: var(--display);
  font-size: 26px;
  letter-spacing: 1px;
  line-height: 1;
}

.summary-val.up { color: var(--accent); }
.summary-val.down { color: var(--red); }
.summary-val.neutral { color: var(--gold); }

.summary-lbl {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 5px;
}

/* 유형별 바 */
.type-stat-section { margin-bottom: 22px; }

.type-stat-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.type-stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 9px;
}

.type-stat-name {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  width: 64px;
  text-align: right;
  flex-shrink: 0;
}

.type-stat-track {
  flex: 1;
  height: 26px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
}

.type-stat-fill {
  height: 100%;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  min-width: 52px;
  white-space: nowrap;
}

.type-stat-fill.up {
  background: rgba(0,229,160,0.12);
  color: var(--accent);
  border-left: 2px solid var(--accent);
}

.type-stat-fill.down {
  background: rgba(255,77,109,0.12);
  color: var(--red);
  border-left: 2px solid var(--red);
}

.type-stat-count {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* 분포 바 */
.dist-section { }

.dist-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.dist-name {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  width: 64px;
  text-align: right;
  flex-shrink: 0;
}

.dist-bar {
  flex: 1;
  height: 20px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  display: flex;
}

.dist-up {
  background: rgba(0,229,160,0.18);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 4px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  min-width: 28px;
}

.dist-down {
  background: rgba(255,77,109,0.18);
  height: 100%;
  display: flex;
  align-items: center;
  padding-left: 4px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--red);
  min-width: 28px;
}

.stats-empty {
  text-align: center;
  padding: 48px 20px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  line-height: 2;
}

/* ══════════════════════════════
   로딩 / 에러
══════════════════════════════ */
.loading {
  text-align: center;
  padding: 80px;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.loading::after {
  content: '';
  display: block;
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 16px auto 0;
  animation: spin 0.8s linear infinite;
}

.error {
  text-align: center;
  padding: 48px;
  color: var(--red);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   툴팁
══════════════════════════════ */
.custom-tooltip {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--accent);
  padding: 14px 18px;
  pointer-events: none;
  z-index: 1000;
  min-width: 220px;
  max-width: 290px;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}

.tt-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.tt-price {
  font-family: var(--display);
  font-size: 28px;
  color: var(--accent);
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 8px;
}

.tt-disc {
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 4px;
}

.tt-disc-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.tt-disc-title {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 5px;
}

.tt-disc-change {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
}

.tt-pattern {
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 8px;
}

.tt-pattern-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.tt-pattern-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="container">

  <!-- 헤더 — 한 줄 -->
  <header class="header">
    <div class="header-left">
      <span class="logo-badge">Fact over Opinion</span>
      <h1 class="site-title">공시 <em>×</em> 주가 패턴 분석</h1>
      <span class="header-sub">DART × KRX — 역사는 반복된다</span>
    </div>
    <div class="header-right">
      <div class="hstat">
        <div class="hstat-val">10</div>
        <div class="hstat-label">종목</div>
      </div>
      <div class="hstat">
        <div class="hstat-val">2Y</div>
        <div class="hstat-label">데이터</div>
      </div>
      <div class="hstat" id="hstatDisc">
        <div class="hstat-val">—</div>
        <div class="hstat-label">공시</div>
      </div>
    </div>
  </header>

  <!-- 종목 선택 -->
  <div class="stock-section">
    <div class="section-label">종목 선택</div>
    <div class="stock-grid" id="stockBtns"></div>
  </div>

  <!-- 메인 레이아웃 -->
  <div class="main-layout">

<script>
const STOCKS = ['삼성전자','SK하이닉스','현대차','카카오','NAVER','LG에너지솔루션','한화에어로스페이스','KB금융','HD현대','두산에너빌리티'];
const DATA_URL = 'stock_data.json';

const TYPE_COLORS = {
  '실적발표': '#4d9fff',
  '배당':     '#00e5a0',
  '자사주':   '#a78bfa',
  '대규모계약':'#f97316',
  '투자결정': '#f5a623',
  '풍문해명': '#fb7185',
  '기타공시': '#334155'
};

let currentStock = null;
let chartInstance = null;
let allData = null;
let patternOn = true; // 기본값 ON
let selectedType = null;
let activeTypeFilter = '전체';
let _zoomMin = 0, _zoomMax = 0, _zoomTotal = 0;

function _applyZoom() {
  if (!chartInstance) return;
  chartInstance.options.scales.x.min = _zoomMin;
  chartInstance.options.scales.x.max = _zoomMax;
  chartInstance.update('none');
  const mw = document.getElementById('minimapWrap');
  const mr = document.getElementById('minimapRange');
  if (mw && mr && _zoomTotal > 1) {
    mr.style.left = (_zoomMin / (_zoomTotal - 1) * 100) + '%';
    mr.style.width = ((_zoomMax - _zoomMin) / (_zoomTotal - 1) * 100) + '%';
  }
}

function renderButtons() {
  document.getElementById('stockBtns').innerHTML = STOCKS.map(s =>
    `<button class="stock-btn ${s===currentStock?'active':''}" onclick="selectStock('${s}')">${s}</button>`
  ).join('');
}

function selectStock(name) {
  currentStock = name;
  patternOn = true; // 종목 변경 시도 ON 유지
  selectedType = null;
  activeTypeFilter = '전체';

  // 토글 ON 상태로
  document.getElementById('patternToggle').checked = true;
  const lbl = document.getElementById('toggleLabel');
  lbl.textContent = '유사 패턴 오버랩 ON';
  lbl.classList.add('active');
  document.getElementById('patternSelectWrap').classList.add('visible');
  document.getElementById('legendPattern').style.display = 'flex';

  renderButtons();
  document.getElementById('currentStockName').textContent = name;

  const prices = (allData.prices[name]||[]).map(p=>({date:p[0],price:p[1]}));
  const disclosures = allData.disclosures.filter(d=>d.name===name);

  if (prices.length > 0) {
    const latest = prices[prices.length-1];
    const prev = prices[prices.length-2];
    document.getElementById('latestPrice').textContent = Number(latest.price).toLocaleString('ko-KR')+'원';
    if (prev) {
      const chg = ((latest.price-prev.price)/prev.price*100).toFixed(2);
      const el = document.getElementById('priceChange');
      el.textContent = (chg>0?'▲ +':'▼ ')+Math.abs(chg)+'%';
      el.className = 'price-change '+(chg>=0?'up':'down');
    }
  }

  // 공시 유형 버튼 렌더링
  const types = [...new Set(disclosures.map(d=>d.type).filter(Boolean))];
  document.getElementById('patternSelectWrap').innerHTML =
    `<span class="type-label-small">공시 유형</span>` +
    types.map(t =>
      `<button class="type-btn ${selectedType===t?'active':''}" onclick="selectPatternType('${t}')">${t}</button>`
    ).join('');

  renderChart(prices, disclosures, null);
  renderTable(disclosures);
  renderTypeFilter(disclosures);
  renderStatsPanel(disclosures);
}

function togglePattern() {
  patternOn = document.getElementById('patternToggle').checked;
  const label = document.getElementById('toggleLabel');
  if (patternOn) {
    label.textContent = '유사 패턴 오버랩 ON';
    label.classList.add('active');
    document.getElementById('patternSelectWrap').classList.add('visible');
    document.getElementById('legendPattern').style.display = 'flex';
    if (selectedType) applyPattern();
  } else {
    label.textContent = '유사 패턴 오버랩';
    label.classList.remove('active');
    document.getElementById('patternSelectWrap').classList.remove('visible');
    document.getElementById('patternStats').classList.remove('visible');
    document.getElementById('legendPattern').style.display = 'none';
    selectedType = null;
    const prices = (allData.prices[currentStock]||[]).map(p=>({date:p[0],price:p[1]}));
    const disclosures = allData.disclosures.filter(d=>d.name===currentStock);
    renderChart(prices, disclosures, null);
  }
}

function selectPatternType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === type);
  });
  applyPattern();
}

function applyPattern() {
  if (!currentStock || !selectedType) return;
  const prices = (allData.prices[currentStock]||[]).map(p=>({date:p[0],price:p[1]}));
  const disclosures = allData.disclosures.filter(d=>d.name===currentStock);
  const typeDiscs = disclosures.filter(d=>d.type===selectedType);
  const changes = typeDiscs.map(d=>{
    const raw = String(d.change).replace('%','').trim();
    const v = parseFloat(raw);
    return Math.abs(v)<1 ? v*100 : v;
  }).filter(v=>!isNaN(v));

  if (changes.length === 0) {
    document.getElementById('patternInfo').textContent = '데이터 없음';
    return;
  }

  const avg = changes.reduce((a,b)=>a+b,0)/changes.length;
  const upCount = changes.filter(v=>v>=0).length;
  const upRate = (upCount/changes.length*100).toFixed(0);
  const maxV = Math.max(...changes);
  const minV = Math.min(...changes);

  document.getElementById('statCount').textContent = changes.length+'건';
  const avgEl = document.getElementById('statAvg');
  avgEl.textContent = (avg>=0?'+':'')+avg.toFixed(2)+'%';
  avgEl.className = 'stat-pill-val '+(avg>=0?'up':'down');
  document.getElementById('statUp').textContent = upRate+'%';
  document.getElementById('statMax').textContent = '+'+maxV.toFixed(2)+'%';
  document.getElementById('statMin').textContent = minV.toFixed(2)+'%';
  document.getElementById('patternStats').classList.add('visible');
  document.getElementById('patternInfo').textContent = `${selectedType} ${changes.length}건`;

  const dateList = prices.map(p=>p.date);
  const windows = [];
  typeDiscs.forEach(d=>{
    const idx = dateList.indexOf(d.date);
    if (idx<5 || idx>dateList.length-11) return;
    const base = prices[idx-1]?.price;
    if (!base) return;
    const w = [];
    for (let k=-5; k<=10; k++) {
      const p = prices[idx+k]?.price;
      w.push(p ? (p-base)/base*100 : null);
    }
    windows.push(w);
  });

  const avgWindow = Array(16).fill(0).map((_,i)=>{
    const vals = windows.map(w=>w[i]).filter(v=>v!==null);
    return vals.length>0 ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  });

  const patternData = new Array(prices.length).fill(null);
  typeDiscs.forEach(d=>{
    const idx = dateList.indexOf(d.date);
    if (idx<5 || idx>prices.length-11) return;
    const base = prices[idx-1]?.price;
    if (!base) return;
    for (let k=-5; k<=10; k++) {
      const pi = idx+k;
      if (pi<0 || pi>=prices.length) continue;
      const avgPct = avgWindow[k+5];
      if (avgPct===null) continue;
      const pp = base*(1+avgPct/100);
      if (patternData[pi]===null) patternData[pi] = pp;
      else patternData[pi] = (patternData[pi]+pp)/2;
    }
  });

  renderChart(prices, disclosures, patternData);
}

function renderChart(prices, disclosures, patternData) {
  const container = document.getElementById('chartContainer');
  container.innerHTML = '<canvas id="myChart"></canvas>';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (!prices.length) { container.innerHTML='<div class="error">주가 데이터 없음</div>'; return; }

  const discMap = {};
  disclosures.forEach(d=>{ if(!discMap[d.date]) discMap[d.date]=[]; discMap[d.date].push(d); });

  const datasets = [
    {
      label:'종가',
      data:prices.map(p=>p.price),
      borderColor:'#00e5a0',
      borderWidth:1.5,
      pointRadius:0,
      pointHoverRadius:5,
      pointHoverBackgroundColor:'#00e5a0',
      pointHoverBorderColor:'#07090d',
      pointHoverBorderWidth:2,
      fill:true,
      backgroundColor: ctx=>{
        const g=ctx.chart.ctx.createLinearGradient(0,0,0,440);
        g.addColorStop(0,'rgba(0,229,160,0.12)');
        g.addColorStop(0.6,'rgba(0,229,160,0.02)');
        g.addColorStop(1,'rgba(0,229,160,0)');
        return g;
      },
      tension:0.3, order:2
    },
    {
      label:'공시',
      data:prices.map(p=>discMap[p.date]?p.price:null),
      borderColor:'transparent',
      backgroundColor:'#ff4d6d',
      pointRadius:prices.map(p=>discMap[p.date]?7:0),
      pointStyle:'rectRot',
      pointHoverRadius:9,
      pointHoverBackgroundColor:'#ff4d6d',
      showLine:false, order:1
    }
  ];

  if (patternData) {
    datasets.push({
      label:'패턴평균',
      data:patternData,
      borderColor:'#f5a623',
      borderWidth:1.5,
      borderDash:[5,4],
      pointRadius:0,
      pointHoverRadius:4,
      pointHoverBackgroundColor:'#f5a623',
      fill:false,
      tension:0.3, order:0
    });
  }

  const discLinePlugin = {
    id: 'discLine',
    afterDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      const hoveredIdx = chart._hoveredIndex;
      if (hoveredIdx == null) return;
      const label = chart.data.labels[hoveredIdx];
      if (!discMap[label]) return;
      const x = scales.x.getPixelForValue(hoveredIdx);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.strokeStyle = 'rgba(180,180,200,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
  };

  const canvas = document.getElementById('myChart');
  canvas.style.cursor = 'crosshair';

  const total = prices.length;
  _zoomTotal = total;
  _zoomMin = 0;
  _zoomMax = total - 1;

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  let zoomMin = 0, zoomMax = total - 1;

  function setZoom(mn, mx) {
    zoomMin = mn; zoomMax = mx;
    _zoomMin = mn; _zoomMax = mx;
  }

  const ctx = canvas.getContext('2d');
  chartInstance = new Chart(ctx, {
    type:'line',
    data:{ labels:prices.map(p=>p.date), datasets },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false, external:ctx=>externalTooltip(ctx,discMap,patternData,prices)}
      },
      scales:{
        x:{
          ticks:{color:'#3d4f63',font:{family:'JetBrains Mono',size:9},maxTicksLimit:10,maxRotation:0},
          grid:{color:'rgba(28,37,53,0.8)'},
          border:{color:'#1c2535'}
        },
        y:{
          ticks:{color:'#3d4f63',font:{family:'JetBrains Mono',size:9},
            callback:v=>v>=10000000?(v/10000000).toFixed(1)+'천만':v>=1000000?(v/10000).toFixed(0)+'만':v>=10000?(v/10000).toFixed(1)+'만':v.toLocaleString()
          },
          grid:{color:'rgba(28,37,53,0.8)'},
          border:{color:'#1c2535'}
        }
      }
    },
    plugins:[discLinePlugin]
  });

  canvas.addEventListener('mousemove', e => {
    const pts = chartInstance.getElementsAtEventForMode(e, 'index', {intersect:false}, true);
    chartInstance._hoveredIndex = pts.length ? pts[0].index : null;
    chartInstance.draw();
  });
  canvas.addEventListener('mouseleave', () => {
    chartInstance._hoveredIndex = null;
    chartInstance.draw();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const range = zoomMax - zoomMin;
    if (e.ctrlKey || e.metaKey) {
      const rect = canvas.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      const center = Math.round(zoomMin + range * ratio);
      const factor = e.deltaY > 0 ? 1.15 : 0.87;
      let newRange = clamp(Math.round(range * factor), 20, total - 1);
      let newMin = Math.round(center - newRange * ratio);
      let newMax = newMin + newRange;
      if (newMin < 0) { newMin = 0; newMax = newRange; }
      if (newMax >= total) { newMax = total - 1; newMin = newMax - newRange; }
      setZoom(clamp(newMin,0,total-1), clamp(newMax,0,total-1));
    } else {
      const step = Math.max(1, Math.round(range * 0.05));
      const dir = e.deltaY > 0 ? step : -step;
      let newMin = zoomMin + dir, newMax = zoomMax + dir;
      if (newMin < 0) { newMin = 0; newMax = range; }
      if (newMax >= total) { newMax = total - 1; newMin = newMax - range; }
      setZoom(newMin, newMax);
    }
    _applyZoom();
  }, { passive: false });

  let dragStart = null, dragZoomMin = null, dragZoomMax = null;
  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragStart = e.clientX; dragZoomMin = zoomMin; dragZoomMax = zoomMax;
    canvas.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (dragStart === null) return;
    const rect = canvas.getBoundingClientRect();
    const range = dragZoomMax - dragZoomMin;
    const pxPerBar = rect.width / (range + 1);
    const delta = Math.round((dragStart - e.clientX) / pxPerBar);
    let newMin = dragZoomMin + delta, newMax = dragZoomMax + delta;
    if (newMin < 0) { newMin = 0; newMax = range; }
    if (newMax >= total) { newMax = total - 1; newMin = newMax - range; }
    setZoom(newMin, newMax);
    _applyZoom();
  });
  document.addEventListener('mouseup', () => {
    if (dragStart !== null) { dragStart = null; canvas.style.cursor = 'crosshair'; }
  });
  canvas.addEventListener('dblclick', () => { setZoom(0, total-1); _applyZoom(); });

  // 미니맵
  let minimapWrap = document.getElementById('minimapWrap');
  if (!minimapWrap) {
    minimapWrap = document.createElement('div');
    minimapWrap.id = 'minimapWrap';
    minimapWrap.style.cssText = 'margin:0 24px 16px;height:32px;background:rgba(0,0,0,0.3);border:1px solid #1c2535;border-radius:2px;position:relative;cursor:pointer;overflow:hidden;';
    const minimapCanvas = document.createElement('canvas');
    minimapCanvas.id = 'minimapCanvas';
    minimapCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
    minimapWrap.appendChild(minimapCanvas);
    const minimapRange = document.createElement('div');
    minimapRange.id = 'minimapRange';
    minimapRange.style.cssText = 'position:absolute;top:0;bottom:0;background:rgba(0,229,160,0.1);border-left:2px solid #00e5a0;border-right:2px solid #00e5a0;cursor:grab;box-sizing:border-box;';
    minimapWrap.appendChild(minimapRange);
    document.querySelector('.chart-body').parentNode.insertBefore(minimapWrap, document.querySelector('.chart-body').nextSibling);
  }

  const minimapCanvas = document.getElementById('minimapCanvas');
  const minimapRange = document.getElementById('minimapRange');

  function drawMinimap() {
    const w = minimapWrap.offsetWidth, h = 32;
    minimapCanvas.width = w; minimapCanvas.height = h;
    const mctx = minimapCanvas.getContext('2d');
    mctx.clearRect(0,0,w,h);
    if (!prices.length) return;
    const vals = prices.map(p=>p.price);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const scaleX = w/(total-1), scaleY = (h-4)/(maxV-minV||1);
    mctx.beginPath();
    vals.forEach((v,i)=>{
      const x = i*scaleX, y = h-2-(v-minV)*scaleY;
      i===0?mctx.moveTo(x,y):mctx.lineTo(x,y);
    });
    mctx.strokeStyle = 'rgba(0,229,160,0.35)';
    mctx.lineWidth = 1;
    mctx.stroke();
  }

  if (!minimapWrap._eventsAttached) {
    minimapWrap._eventsAttached = true;
    let mmDrag = null;
    minimapRange.addEventListener('mousedown', e => {
      e.stopPropagation();
      mmDrag = {startX:e.clientX, startMin:_zoomMin, startMax:_zoomMax};
      minimapRange.style.cursor = 'grabbing';
    });
    minimapWrap.addEventListener('mousedown', e => {
      if (mmDrag) return;
      const rect = minimapWrap.getBoundingClientRect();
      const ratio = (e.clientX-rect.left)/rect.width;
      const clickIdx = Math.round(ratio*(_zoomTotal-1));
      const range = _zoomMax - _zoomMin;
      let newMin = Math.round(clickIdx-range/2), newMax = newMin+range;
      if (newMin<0){newMin=0;newMax=range;}
      if (newMax>=_zoomTotal){newMax=_zoomTotal-1;newMin=newMax-range;}
      _zoomMin=Math.max(0,newMin); _zoomMax=Math.min(_zoomTotal-1,newMax);
      _applyZoom();
    });
    document.addEventListener('mousemove', e => {
      if (!mmDrag) return;
      const rect = minimapWrap.getBoundingClientRect();
      const range = mmDrag.startMax-mmDrag.startMin;
      const barPx = rect.width/(_zoomTotal-1);
      const barDelta = Math.round((e.clientX-mmDrag.startX)/barPx);
      let newMin = mmDrag.startMin+barDelta, newMax = mmDrag.startMax+barDelta;
      if (newMin<0){newMin=0;newMax=range;}
      if (newMax>=_zoomTotal){newMax=_zoomTotal-1;newMin=newMax-range;}
      _zoomMin=newMin; _zoomMax=newMax; _applyZoom();
    });
    document.addEventListener('mouseup', ()=>{ if(mmDrag){mmDrag=null;minimapRange.style.cursor='grab';} });
    window.addEventListener('resize', ()=>{ drawMinimap(); _applyZoom(); });
  }

  requestAnimationFrame(()=>{ drawMinimap(); _applyZoom(); });
}

function externalTooltip(context, discMap, patternData, prices) {
  const tooltip = document.getElementById('customTooltip');
  const {chart,tooltip:tt} = context;
  if (tt.opacity===0) { tooltip.style.display='none'; return; }

  const date = tt.dataPoints?.[0]?.label;
  const pricePoint = tt.dataPoints?.find(p => p.datasetIndex === 0);
  const price = pricePoint?.raw ?? tt.dataPoints?.[0]?.raw;
  const priceNum = parseFloat(price);

  document.getElementById('ttDate').textContent = date;
  document.getElementById('ttPrice').textContent = Math.round(priceNum).toLocaleString('ko-KR')+'원';

  const discDiv = document.getElementById('ttDisclosure');
  if (discMap[date]?.length>0) {
    const d = discMap[date][0];
    let t = d.title.length>38?d.title.slice(0,38)+'…':d.title;
    if (discMap[date].length>1) t+=` 외 ${discMap[date].length-1}건`;
    document.getElementById('ttDiscTitle').textContent = t;
    const raw = String(d.change).replace('%','').trim();
    const chgVal = parseFloat(raw);
    const changeEl = document.getElementById('ttDiscChange');
    if (!isNaN(chgVal)) {
      const pct = Math.abs(chgVal)<1?chgVal*100:chgVal;
      changeEl.textContent = (pct>=0?'▲ +':'▼ ')+Math.abs(pct).toFixed(2)+'%';
      changeEl.style.color = pct>=0?'#00e5a0':'#ff4d6d';
    } else { changeEl.textContent=d.change||'—'; changeEl.style.color='#3d4f63'; }
    discDiv.style.display='block';
  } else { discDiv.style.display='none'; }

  const ttPattern = document.getElementById('ttPattern');
  if (patternData && prices) {
    const idx = prices.findIndex(p=>p.date===date);
    const patVal = idx>=0 ? patternData[idx] : null;
    if (patVal !== null && patVal > 0 && !isNaN(priceNum)) {
      const diff = ((priceNum - patVal) / patVal * 100).toFixed(2);
      const el = document.getElementById('ttPatternVal');
      el.textContent = `패턴 대비 ${diff>=0?'+':''}${diff}% 괴리`;
      el.style.color = Math.abs(diff)>3?'#f5a623':diff>=0?'#00e5a0':'#ff4d6d';
      ttPattern.style.display='block';
    } else { ttPattern.style.display='none'; }
  } else { ttPattern.style.display='none'; }

  tooltip.style.display='block';
}

function renderStatsPanel(disclosures) {
  const body = document.getElementById('statsPanelBody');
  const sub = document.getElementById('statsPanelSub');

  if (!disclosures || disclosures.length === 0) {
    body.innerHTML = '<div class="stats-empty">공시 데이터 없음</div>';
    return;
  }

  sub.textContent = currentStock + ' — ' + disclosures.length + '건 분석';

  const typeStats = {};
  disclosures.forEach(function(d) {
    const raw = String(d.change).replace('%','').trim();
    const v = parseFloat(raw);
    const pct = isNaN(v) ? null : (Math.abs(v) < 1 ? v * 100 : v);
    if (!typeStats[d.type]) typeStats[d.type] = { sum: 0, count: 0, up: 0 };
    if (pct !== null) {
      typeStats[d.type].sum += pct;
      typeStats[d.type].count++;
      if (pct >= 0) typeStats[d.type].up++;
    }
  });

  const allVals = disclosures.map(function(d) {
    const raw = String(d.change).replace('%','').trim();
    const v = parseFloat(raw);
    return isNaN(v) ? null : (Math.abs(v) < 1 ? v * 100 : v);
  }).filter(v => v !== null);

  const totalAvg = allVals.length ? allVals.reduce((a,b)=>a+b,0)/allVals.length : 0;
  const upRate = allVals.length ? Math.round(allVals.filter(v=>v>=0).length/allVals.length*100) : 0;
  const maxVal = allVals.length ? Math.max(...allVals) : 0;

  const types = Object.keys(typeStats).sort((a,b)=>{
    const avgA = typeStats[a].count ? typeStats[a].sum/typeStats[a].count : 0;
    const avgB = typeStats[b].count ? typeStats[b].sum/typeStats[b].count : 0;
    return avgB - avgA;
  });

  const maxAbs = Math.max(...types.map(t=>typeStats[t].count?Math.abs(typeStats[t].sum/typeStats[t].count):0), 1);

  let html = '<div class="summary-grid">';
  html += `<div class="summary-card"><div class="summary-val neutral">${disclosures.length}</div><div class="summary-lbl">총 공시</div></div>`;
  html += `<div class="summary-card"><div class="summary-val ${totalAvg>=0?'up':'down'}">${totalAvg>=0?'+':''}${totalAvg.toFixed(2)}%</div><div class="summary-lbl">평균 수익률</div></div>`;
  html += `<div class="summary-card"><div class="summary-val neutral">${upRate}%</div><div class="summary-lbl">상승 확률</div></div>`;
  html += `<div class="summary-card"><div class="summary-val up">+${maxVal.toFixed(2)}%</div><div class="summary-lbl">최고 반응</div></div>`;
  html += '</div>';

  html += '<div class="type-stat-section"><div class="type-stat-label">유형별 평균 수익률</div>';
  types.forEach(t => {
    const s = typeStats[t];
    if (!s.count) return;
    const avg = s.sum/s.count;
    const width = Math.max(Math.round(Math.abs(avg)/maxAbs*100), 20);
    const cls = avg>=0?'up':'down';
    html += `<div class="type-stat-row">
      <div class="type-stat-name">${t}</div>
      <div class="type-stat-track"><div class="type-stat-fill ${cls}" style="width:${width}%">${avg>=0?'+':''}${avg.toFixed(2)}%</div></div>
      <div class="type-stat-count">${s.count}건</div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="dist-section"><div class="type-stat-label">상승 / 하락 분포</div>';
  types.forEach(t => {
    const s = typeStats[t];
    if (!s.count) return;
    const upPct = Math.round(s.up/s.count*100);
    html += `<div class="dist-row">
      <div class="dist-name">${t}</div>
      <div class="dist-bar">
        <div class="dist-up" style="width:${upPct}%">${upPct}%</div>
        <div class="dist-down" style="width:${100-upPct}%">${100-upPct}%</div>
      </div>
    </div>`;
  });
  html += '</div>';

  body.innerHTML = html;
}

function renderTypeFilter(disclosures) {
  const types = ['전체', ...new Set(disclosures.map(d=>d.type).filter(Boolean))];
  document.getElementById('typeFilterWrap').innerHTML = types.map(t=>
    `<button class="filter-btn ${t===activeTypeFilter?'active':''}" onclick="filterByType('${t}')">${t}</button>`
  ).join('');
}

function filterByType(type) {
  activeTypeFilter = type;
  renderTypeFilter(allData.disclosures.filter(d=>d.name===currentStock));
  const disclosures = allData.disclosures.filter(d=>d.name===currentStock && (type==='전체'||d.type===type));
  renderTableRows(disclosures);
  document.getElementById('disclosureCount').textContent = `총 ${disclosures.length}건`;
}

function renderTable(disclosures) {
  renderTypeFilter(disclosures);
  renderTableRows(disclosures);
  document.getElementById('disclosureCount').textContent = `총 ${disclosures.length}건`;
}

function renderTableRows(disclosures) {
  const c = document.getElementById('tableContainer');
  if (!disclosures.length) { c.innerHTML='<div class="loading">공시 데이터 없음</div>'; return; }
  const sorted = [...disclosures].sort((a,b)=>b.date.localeCompare(a.date));
  const rows = sorted.map(d=>{
    const raw = String(d.change).replace('%','').trim();
    const chgVal = parseFloat(raw);
    let cls='neutral', txt=d.change||'—';
    if (!isNaN(chgVal)) {
      const pct = Math.abs(chgVal)<1?chgVal*100:chgVal;
      cls=pct>=0?'up':'down';
      txt=(pct>=0?'▲ +':'▼ ')+Math.abs(pct).toFixed(2)+'%';
    }
    const color = TYPE_COLORS[d.type]||'#334155';
    const typeBadge = `<span class="td-type" style="background:${color}18;color:${color};border:1px solid ${color}35">${d.type||'기타'}</span>`;
    const dartUrl = d.rcpNo && d.rcpNo !== '' && d.rcpNo !== 'undefined'
      ? `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${d.rcpNo}` : null;
    const titleCell = dartUrl
      ? `<a class="dart-link" href="${dartUrl}" target="_blank" rel="noopener">${d.title}<span class="dart-icon">↗</span></a>`
      : d.title;
    return `<tr>
      <td class="td-date">${d.date}</td>
      <td>${typeBadge}</td>
      <td>${titleCell}</td>
      <td class="td-change ${cls}">${txt}</td>
    </tr>`;
  }).join('');
  c.innerHTML=`<table>
    <thead><tr><th>날짜</th><th>유형</th><th>공시 제목</th><th style="text-align:right">변동률</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

document.addEventListener('mousemove', e => {
  const tooltip = document.getElementById('customTooltip');
  if (tooltip.style.display === 'block') {
    const tw = tooltip.offsetWidth||240, th = tooltip.offsetHeight||100;
    let left = e.clientX+16, top = e.clientY+12;
    if (left+tw > window.innerWidth-8) left = e.clientX-tw-16;
    if (top+th > window.innerHeight-8) top = e.clientY-th-12;
    if (top<8) top=8;
    tooltip.style.left = left+'px';
    tooltip.style.top = top+'px';
  }
});

renderButtons();
fetch(DATA_URL)
  .then(r=>r.json())
  .then(data=>{
    allData = data;
    document.querySelector('#hstatDisc .hstat-val').textContent = data.disclosures.length;
    selectStock('삼성전자');
  })
  .catch(e=>{
    document.getElementById('chartContainer').innerHTML=`<div class="error">⚠ ${e.message}</div>`;
  });
</script>
</body>
</html>
